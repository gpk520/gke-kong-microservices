apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: us-central1-docker.pkg.dev/ecommerce-cloudrun/kong-microservices/product-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
